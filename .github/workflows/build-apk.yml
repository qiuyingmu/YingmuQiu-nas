name: Build Android APK

on:
  release:
    types: [published, edited]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './mobile/package-lock.json'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK with EAS
        run: |
          echo "Starting EAS build..."
          eas build --platform android --profile preview --non-interactive 2>&1 || \
          (echo "EAS failed, retrying..." && sleep 30 && \
           eas build --platform android --profile preview --non-interactive 2>&1) || \
          (echo "EAS failed again, trying local export..." && \
           npx expo export --platform android 2>&1 && \
           echo "Export succeeded but APK needs local build")

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK=$(find . -name "*.apk" -o -name "*.aab" | head -1)
          if [ -n "$APK" ]; then
            gh release upload ${{ github.event.release.tag_name }} "$APK" --clobber
            echo "APK uploaded: $APK"
          else
            echo "No APK found, EAS build may have failed or not completed"
          fi
