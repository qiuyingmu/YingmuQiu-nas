server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:nasdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: false

app:
  storage:
    dir: ./nas-data
  ffmpeg:
    path: ffmpeg
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: http://localhost:3000
  allowed-origins: http://localhost:3000
